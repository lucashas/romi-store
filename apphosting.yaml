# Configuración para Firebase App Hosting
runConfig:
  # Mantener una instancia mínima para asegurar rapidez en las respuestas de TikTok
  minInstances: 0
  maxInstances: 1
  # Memoria recomendada para Next.js con Genkit
  memory: 512MiB
env:
  - variable: MY_GEMINI_KEY
    availability:
      - BUILD
      - RUNTIME
